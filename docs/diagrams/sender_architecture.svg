<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <style>text{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
    <marker id="arrteal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#fff"/>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">tgen — Sender Architecture</text>

  <!-- ===== INTERFACE BOX (center top) ===== -->
  <rect x="350" y="52" width="500" height="105" rx="9" fill="#0f766e" stroke="#115e59" stroke-width="2"/>
  <text x="600" y="76" text-anchor="middle" font-size="11" fill="#99f6e4" font-style="italic" letter-spacing="0.5">«interface»</text>
  <text x="600" y="98" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">sender.Interface</text>
  <line x1="360" y1="108" x2="840" y2="108" stroke="#99f6e4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="600" y="127" text-anchor="middle" font-size="12" fill="#ccfbf1">Send(data []byte) error · Close()</text>
  <text x="600" y="146" text-anchor="middle" font-size="10" fill="#99f6e4" font-style="italic">internal/sender/sender.go</text>

  <!-- ===== INHERITANCE LINES (from interface to implementations) ===== -->
  <!-- Left branch: interface bottom-left (480, 157) to *Sender top (200, 240) -->
  <line x1="490" y1="157" x2="200" y2="240" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Center: interface bottom-center (600, 157) to *PoolSender top (600, 240) -->
  <line x1="600" y1="157" x2="600" y2="240" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Right branch: interface bottom-right (710, 157) to *RawSender top (1000, 240) -->
  <line x1="710" y1="157" x2="1000" y2="240" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- "implements" labels -->
  <text x="300" y="207" text-anchor="middle" font-size="9" fill="#9ca3af" font-style="italic" transform="rotate(-22,300,207)">implements</text>
  <text x="612" y="205" font-size="9" fill="#9ca3af" font-style="italic">implements</text>
  <text x="895" y="207" text-anchor="middle" font-size="9" fill="#9ca3af" font-style="italic" transform="rotate(22,895,207)">implements</text>

  <!-- ===== IMPLEMENTATION 1: *Sender ===== -->
  <rect x="30" y="242" width="340" height="190" rx="8" fill="#1d4ed8" stroke="#1e40af" stroke-width="1.5"/>
  <text x="200" y="268" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">*Sender</text>
  <line x1="40" y1="278" x2="360" y2="278" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="200" y="296" text-anchor="middle" font-size="11" fill="#bfdbfe">handle *pcap.Handle</text>
  <text x="200" y="314" text-anchor="middle" font-size="11" fill="#bfdbfe">mu     sync.Mutex</text>
  <text x="200" y="332" text-anchor="middle" font-size="11" fill="#bfdbfe">iface  string</text>
  <line x1="40" y1="342" x2="360" y2="342" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="200" y="360" text-anchor="middle" font-size="10" fill="#93c5fd">Send: mu.Lock() + WritePacketData() + mu.Unlock()</text>
  <text x="200" y="377" text-anchor="middle" font-size="10" fill="#93c5fd">Mutex required: pcap_sendpacket is not goroutine-safe</text>
  <text x="200" y="394" text-anchor="middle" font-size="10" fill="#93c5fd">Works on: macOS + Linux + any libpcap platform</text>
  <text x="200" y="411" text-anchor="middle" font-size="10" fill="#93c5fd">sender.New(iface string) (*Sender, error)</text>
  <text x="200" y="426" text-anchor="middle" font-size="10" fill="#93c5fd">Selected via: --interface eth0 (single NIC)</text>

  <!-- ===== IMPLEMENTATION 2: *PoolSender ===== -->
  <rect x="430" y="242" width="340" height="190" rx="8" fill="#1d4ed8" stroke="#1e40af" stroke-width="1.5"/>
  <text x="600" y="268" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">*PoolSender</text>
  <line x1="440" y1="278" x2="760" y2="278" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="600" y="296" text-anchor="middle" font-size="11" fill="#bfdbfe">senders []Interface</text>
  <text x="600" y="314" text-anchor="middle" font-size="11" fill="#bfdbfe">next    atomic.Uint64</text>
  <line x1="440" y1="325" x2="760" y2="325" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="600" y="343" text-anchor="middle" font-size="10" fill="#93c5fd">idx = (next.Add(1) − 1) % len(senders)</text>
  <text x="600" y="360" text-anchor="middle" font-size="10" fill="#93c5fd">Round-robin across N underlying senders</text>
  <text x="600" y="377" text-anchor="middle" font-size="10" fill="#93c5fd">Lock-free dispatch (atomic counter only)</text>
  <text x="600" y="394" text-anchor="middle" font-size="10" fill="#93c5fd">sender.NewPool(ifaces []string) (*PoolSender, error)</text>
  <text x="600" y="411" text-anchor="middle" font-size="10" fill="#93c5fd">sender.NewPoolFrom(senders []Interface) *PoolSender</text>
  <text x="600" y="426" text-anchor="middle" font-size="10" fill="#93c5fd">Selected via: --interface eth0,eth1,eth2</text>

  <!-- "contains" arrow from PoolSender to *Sender -->
  <path d="M440,370 L390,370" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="3,2" fill="none" marker-end="url(#arrteal)"/>
  <text x="415" y="364" text-anchor="middle" font-size="8" fill="#bfdbfe">contains</text>

  <!-- ===== IMPLEMENTATION 3: *RawSender ===== -->
  <rect x="830" y="242" width="340" height="190" rx="8" fill="#1d4ed8" stroke="#1e40af" stroke-width="1.5"/>
  <text x="1000" y="268" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">*RawSender</text>
  <line x1="840" y1="278" x2="1160" y2="278" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="1000" y="296" text-anchor="middle" font-size="11" fill="#bfdbfe">fd      int  (AF_PACKET socket)</text>
  <text x="1000" y="314" text-anchor="middle" font-size="11" fill="#bfdbfe">sa      syscall.SockaddrLinklayer</text>
  <line x1="840" y1="325" x2="1160" y2="325" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="1000" y="343" text-anchor="middle" font-size="10" fill="#93c5fd">Send: syscall.Sendto(fd, data, 0, &amp;sa)</text>
  <text x="1000" y="360" text-anchor="middle" font-size="10" fill="#93c5fd">No libpcap overhead — direct kernel path</text>
  <text x="1000" y="377" text-anchor="middle" font-size="10" fill="#93c5fd">Lower latency + higher pps than *Sender</text>
  <text x="1000" y="394" text-anchor="middle" font-size="10" fill="#93c5fd">sender.NewRaw(iface string) (*RawSender, error)</text>
  <text x="1000" y="411" text-anchor="middle" font-size="10" fill="#93c5fd">Stub on non-Linux: returns error at init</text>
  <text x="1000" y="426" text-anchor="middle" font-size="10" fill="#93c5fd">Selected via: --sender raw</text>

  <!-- Linux-only badge -->
  <rect x="924" y="222" width="153" height="24" rx="5" fill="#dc2626"/>
  <text x="1000" y="239" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">//go:build linux</text>

  <!-- ===== USAGE / REPLAYER ===== -->
  <rect x="30" y="465" width="340" height="95" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="200" y="490" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Replayer</text>
  <line x1="40" y1="498" x2="360" y2="498" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="200" y="516" text-anchor="middle" font-size="11" fill="#d1d5db">field: sender sender.Interface</text>
  <text x="200" y="533" text-anchor="middle" font-size="10" fill="#9ca3af">internal/replay/replayer.go</text>
  <text x="200" y="550" text-anchor="middle" font-size="10" fill="#9ca3af">calls sender.Send(mutatedBytes)</text>

  <!-- Arrow: Replayer "uses" Interface -->
  <line x1="370" y1="510" x2="346" y2="135" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="380" y="340" font-size="9" fill="#374151" font-style="italic" transform="rotate(90,380,340)">uses sender.Interface</text>

  <!-- ===== SELECTION TABLE ===== -->
  <rect x="430" y="455" width="740" height="170" rx="8" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="800" y="476" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">buildSender() — cmd/tgen/run.go</text>
  <line x1="440" y1="482" x2="1160" y2="482" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Header row -->
  <text x="510" y="499" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">Flag combination</text>
  <text x="780" y="499" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">Implementation selected</text>
  <text x="1040" y="499" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">Notes</text>
  <line x1="440" y1="504" x2="1160" y2="504" stroke="#e5e7eb" stroke-width="1"/>

  <text x="510" y="520" text-anchor="middle" font-size="10" fill="#374151">--interface eth0</text>
  <text x="780" y="520" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="600">*Sender</text>
  <text x="1040" y="520" text-anchor="middle" font-size="10" fill="#6b7280">libpcap, single NIC, mutex-safe</text>

  <text x="510" y="538" text-anchor="middle" font-size="10" fill="#374151">--interface eth0,eth1,eth2</text>
  <text x="780" y="538" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="600">*PoolSender</text>
  <text x="1040" y="538" text-anchor="middle" font-size="10" fill="#6b7280">round-robin 3 NICs, N×throughput</text>

  <text x="510" y="556" text-anchor="middle" font-size="10" fill="#374151">--sender raw --interface eth0</text>
  <text x="780" y="556" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="600">*RawSender</text>
  <text x="1040" y="556" text-anchor="middle" font-size="10" fill="#dc2626">Linux only, AF_PACKET, fastest</text>

  <text x="510" y="574" text-anchor="middle" font-size="10" fill="#374151">--target-ip 8.8.8.8</text>
  <text x="780" y="574" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="600">*Sender</text>
  <text x="1040" y="574" text-anchor="middle" font-size="10" fill="#6b7280">auto-detected interface via UDP trick</text>

  <text x="510" y="592" text-anchor="middle" font-size="10" fill="#374151">--sender raw + --interface eth0,eth1</text>
  <text x="780" y="592" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="600">*PoolSender&lt;*RawSender&gt;</text>
  <text x="1040" y="592" text-anchor="middle" font-size="10" fill="#6b7280">pool of raw senders (Linux)</text>

  <line x1="440" y1="600" x2="1160" y2="600" stroke="#e5e7eb" stroke-width="1"/>
  <text x="800" y="617" text-anchor="middle" font-size="10" fill="#9ca3af" font-style="italic">All implementations satisfy sender.Interface — Replayer is decoupled from injection mechanism</text>
</svg>
