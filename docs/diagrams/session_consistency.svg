<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <style>text{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
    <marker id="arrhit" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#166534"/>
    </marker>
    <marker id="arrmiss" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b91c1c"/>
    </marker>
    <marker id="arrrst" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#fff"/>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">tgen — Session Consistency &amp; Plan Cache</text>

  <!-- ===== EXPLANATION TOP ===== -->
  <rect x="12" y="42" width="1176" height="52" rx="7" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">mutation.Mutator.PlanFor(session.Key) — one Plan per 5-tuple, cached for all packets in the session</text>
  <text x="600" y="80" text-anchor="middle" font-size="11" fill="#6b7280">Plan contains: src IP · dst IP · src port · dst port · dst MAC · TTL · DSCP — drawn once from IP pool, reused for every packet in the session</text>

  <!-- ===== COLUMN HEADERS ===== -->
  <text x="110" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Session</text>
  <text x="340" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Request</text>
  <text x="590" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Cache (session.Key → Plan)</text>
  <text x="870" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Result</text>
  <text x="1090" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Plan contents</text>

  <!-- ===== ROW 1: S1 First Packet — CACHE MISS ===== -->
  <rect x="12" y="124" width="1176" height="72" rx="0" fill="#fff5f5"/>
  <line x1="12" y1="124" x2="1188" y2="124" stroke="#fee2e2" stroke-width="1"/>
  <line x1="12" y1="196" x2="1188" y2="196" stroke="#fee2e2" stroke-width="1"/>

  <!-- Session box -->
  <rect x="20" y="132" width="178" height="54" rx="6" fill="#1d4ed8"/>
  <text x="109" y="153" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Session S1</text>
  <text x="109" y="170" text-anchor="middle" font-size="10" fill="#bfdbfe">key: 10.0.0.1:4000→</text>
  <text x="109" y="184" text-anchor="middle" font-size="10" fill="#bfdbfe">10.0.0.2:80/TCP</text>

  <!-- Arrow S1 → PlanFor -->
  <line x1="198" y1="159" x2="238" y2="159" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="218" y="152" text-anchor="middle" font-size="9" fill="#6b7280">pkt 1 of 100</text>

  <!-- PlanFor box -->
  <rect x="240" y="136" width="196" height="46" rx="6" fill="#374151"/>
  <text x="338" y="157" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">PlanFor(S1.key)</text>
  <text x="338" y="174" text-anchor="middle" font-size="10" fill="#d1d5db">mutator.PlanFor(key)</text>

  <!-- Arrow to cache (miss) -->
  <line x1="436" y1="159" x2="476" y2="159" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrmiss)"/>
  <text x="456" y="152" text-anchor="middle" font-size="9" fill="#b91c1c">MISS</text>

  <!-- Cache box (empty then filled) -->
  <rect x="478" y="124" width="224" height="72" rx="0" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="590" y="145" text-anchor="middle" font-size="9" fill="#b91c1c" font-style="italic">cache is empty</text>
  <rect x="484" y="152" width="212" height="36" rx="4" fill="#b45309"/>
  <text x="590" y="167" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">expandPool() → random draw</text>
  <text x="590" y="182" text-anchor="middle" font-size="10" fill="#fed7aa">build Plan from IP pool · store in cache</text>

  <!-- Arrow: Plan built -->
  <line x1="702" y1="159" x2="742" y2="159" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Result box -->
  <rect x="744" y="132" width="246" height="54" rx="6" fill="#b91c1c"/>
  <text x="867" y="152" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">new Plan created &amp; cached</text>
  <text x="867" y="169" text-anchor="middle" font-size="10" fill="#fca5a5">cache[S1.key] = Plan{SrcIP: 192.168.1.5,</text>
  <text x="867" y="182" text-anchor="middle" font-size="10" fill="#fca5a5">DstIP: 172.16.0.1, SrcPort: 51234 …}</text>

  <!-- Plan contents annotation -->
  <text x="1090" y="152" text-anchor="middle" font-size="10" fill="#374151">SrcIP: pool[rand]</text>
  <text x="1090" y="168" text-anchor="middle" font-size="10" fill="#374151">DstIP: pool[rand]</text>
  <text x="1090" y="184" text-anchor="middle" font-size="10" fill="#374151">DstMAC: gateway MAC</text>

  <!-- ===== ROW 2: S1 Packets 2-100 — CACHE HIT ===== -->
  <rect x="12" y="196" width="1176" height="72" rx="0" fill="#f0fdf4"/>
  <line x1="12" y1="268" x2="1188" y2="268" stroke="#bbf7d0" stroke-width="1"/>

  <rect x="20" y="204" width="178" height="54" rx="6" fill="#1d4ed8"/>
  <text x="109" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Session S1</text>
  <text x="109" y="242" text-anchor="middle" font-size="10" fill="#bfdbfe">same key</text>
  <text x="109" y="258" text-anchor="middle" font-size="10" fill="#bfdbfe">pkts 2 … 100</text>

  <line x1="198" y1="231" x2="238" y2="231" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="218" y="224" text-anchor="middle" font-size="9" fill="#6b7280">pkt 2 … 100</text>

  <rect x="240" y="208" width="196" height="46" rx="6" fill="#374151"/>
  <text x="338" y="229" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">PlanFor(S1.key)</text>
  <text x="338" y="246" text-anchor="middle" font-size="10" fill="#d1d5db">cache lookup</text>

  <line x1="436" y1="231" x2="476" y2="231" stroke="#166534" stroke-width="1.5" marker-end="url(#arrhit)"/>
  <text x="456" y="224" text-anchor="middle" font-size="9" fill="#166534">HIT ✓</text>

  <!-- Cache box (filled, green glow) -->
  <rect x="478" y="196" width="224" height="72" rx="0" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <rect x="484" y="208" width="212" height="50" rx="4" fill="#166534"/>
  <text x="590" y="226" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">S1 → Plan{SrcIP: 192.168.1.5,</text>
  <text x="590" y="242" text-anchor="middle" font-size="10" fill="#bbf7d0">DstIP: 172.16.0.1, SrcPort: 51234}</text>
  <text x="590" y="258" text-anchor="middle" font-size="9" fill="#86efac" font-style="italic">returned immediately</text>

  <line x1="702" y1="231" x2="742" y2="231" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="744" y="204" width="246" height="54" rx="6" fill="#166534"/>
  <text x="867" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">same Plan reused for all 99 packets</text>
  <text x="867" y="240" text-anchor="middle" font-size="10" fill="#bbf7d0">Consistent IP/port/MAC for entire flow.</text>
  <text x="867" y="256" text-anchor="middle" font-size="10" fill="#bbf7d0">Stateful devices (FW, LB) see coherent session.</text>

  <text x="1090" y="220" text-anchor="middle" font-size="10" fill="#166534" font-weight="600">✓ Same Plan</text>
  <text x="1090" y="236" text-anchor="middle" font-size="10" fill="#374151">Identical rewrites</text>
  <text x="1090" y="252" text-anchor="middle" font-size="10" fill="#374151">across all 100 packets</text>

  <!-- ===== ROW 3: S2 First Packet — DIFFERENT KEY ===== -->
  <rect x="12" y="268" width="1176" height="72" rx="0" fill="#fff5f5"/>
  <line x1="12" y1="340" x2="1188" y2="340" stroke="#fee2e2" stroke-width="1"/>

  <rect x="20" y="276" width="178" height="54" rx="6" fill="#166534"/>
  <text x="109" y="297" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Session S2</text>
  <text x="109" y="314" text-anchor="middle" font-size="10" fill="#bbf7d0">key: 10.0.0.3:9000→</text>
  <text x="109" y="328" text-anchor="middle" font-size="10" fill="#bbf7d0">10.0.0.4:443/TCP</text>

  <line x1="198" y1="303" x2="238" y2="303" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="218" y="296" text-anchor="middle" font-size="9" fill="#6b7280">pkt 1</text>

  <rect x="240" y="280" width="196" height="46" rx="6" fill="#374151"/>
  <text x="338" y="301" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">PlanFor(S2.key)</text>
  <text x="338" y="318" text-anchor="middle" font-size="10" fill="#d1d5db">different key</text>

  <line x1="436" y1="303" x2="476" y2="303" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrmiss)"/>
  <text x="456" y="296" text-anchor="middle" font-size="9" fill="#b91c1c">MISS</text>

  <rect x="478" y="268" width="224" height="72" rx="0" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <rect x="484" y="280" width="212" height="50" rx="4" fill="#166534"/>
  <text x="590" y="298" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">S1 → Plan{…} (cached)</text>
  <text x="590" y="314" text-anchor="middle" font-size="10" fill="#fed7aa">⊕ build S2 Plan → store</text>
  <text x="590" y="330" text-anchor="middle" font-size="10" fill="#fed7aa">S2 → Plan{SrcIP: 10.5.0.9,…}</text>

  <line x1="702" y1="303" x2="742" y2="303" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="744" y="276" width="246" height="54" rx="6" fill="#b91c1c"/>
  <text x="867" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">independent Plan for S2</text>
  <text x="867" y="314" text-anchor="middle" font-size="10" fill="#fca5a5">S2 gets different random IPs/ports than S1.</text>
  <text x="867" y="328" text-anchor="middle" font-size="10" fill="#fca5a5">Sessions do not share rewrites.</text>

  <text x="1090" y="296" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="600">New Plan</text>
  <text x="1090" y="312" text-anchor="middle" font-size="10" fill="#374151">Different IPs/ports</text>
  <text x="1090" y="328" text-anchor="middle" font-size="10" fill="#374151">from same pool</text>

  <!-- ===== IP-POOL-PER-ITER SECTION ===== -->
  <rect x="12" y="352" width="1176" height="140" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="600" y="371" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">--ip-pool-per-iter flag: ResetCache() at start of each loop iteration</text>

  <!-- Iter N box -->
  <rect x="20" y="382" width="180" height="98" rx="7" fill="#7c3aed"/>
  <text x="110" y="405" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Iteration N</text>
  <text x="110" y="422" text-anchor="middle" font-size="10" fill="#ddd6fe">S1 → Plan{SrcIP: 192.168.1.5}</text>
  <text x="110" y="438" text-anchor="middle" font-size="10" fill="#ddd6fe">S2 → Plan{SrcIP: 10.5.0.9}</text>
  <text x="110" y="455" text-anchor="middle" font-size="10" fill="#ddd6fe">S3 → Plan{SrcIP: 172.18.0.3}</text>
  <text x="110" y="472" text-anchor="middle" font-size="10" fill="#c4b5fd">cache has 3 entries</text>

  <!-- ResetCache arrow -->
  <line x1="200" y1="431" x2="318" y2="431" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrrst)"/>
  <text x="259" y="422" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="700">ResetCache()</text>
  <text x="259" y="447" text-anchor="middle" font-size="9" fill="#7c3aed">cache = {}</text>

  <!-- Cache cleared box -->
  <rect x="320" y="382" width="200" height="98" rx="7" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="420" y="405" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">Cache cleared</text>
  <text x="420" y="425" text-anchor="middle" font-size="10" fill="#374151">len(cache) = 0</text>
  <text x="420" y="444" text-anchor="middle" font-size="10" fill="#374151">All old Plans discarded.</text>
  <text x="420" y="462" text-anchor="middle" font-size="10" fill="#374151">Next PlanFor() for any</text>
  <text x="420" y="477" text-anchor="middle" font-size="10" fill="#374151">session → fresh miss.</text>

  <!-- Arrow to Iter N+1 -->
  <line x1="520" y1="431" x2="578" y2="431" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrrst)"/>

  <!-- Iter N+1 box -->
  <rect x="580" y="382" width="200" height="98" rx="7" fill="#7c3aed"/>
  <text x="680" y="405" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Iteration N+1</text>
  <text x="680" y="422" text-anchor="middle" font-size="10" fill="#ddd6fe">S1 → Plan{SrcIP: 10.20.0.7}</text>
  <text x="680" y="438" text-anchor="middle" font-size="10" fill="#ddd6fe">S2 → Plan{SrcIP: 192.0.2.55}</text>
  <text x="680" y="455" text-anchor="middle" font-size="10" fill="#ddd6fe">S3 → Plan{SrcIP: 172.30.1.11}</text>
  <text x="680" y="472" text-anchor="middle" font-size="10" fill="#c4b5fd">fresh random draws</text>

  <!-- Why box -->
  <rect x="810" y="382" width="375" height="98" rx="7" fill="#fff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="997" y="405" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">Why --ip-pool-per-iter matters</text>
  <text x="830" y="424" font-size="10" fill="#374151">• Without flag: same IP mapping used across all loop iterations</text>
  <text x="830" y="441" font-size="10" fill="#374151">• With flag: each iteration draws fresh random IPs from pool</text>
  <text x="830" y="458" font-size="10" fill="#374151">• Produces diverse traffic patterns over long --loops runs</text>
  <text x="830" y="475" font-size="10" fill="#374151">• Forces stateful devices to handle more unique 5-tuples</text>

  <!-- ===== SESSION KEY EXPLANATION ===== -->
  <rect x="12" y="503" width="1176" height="90" rx="7" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="521" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Canonical Session Key (session.Key)</text>
  <text x="600" y="540" text-anchor="middle" font-size="11" fill="#374151">5-tuple stored with smaller endpoint first: min(srcIP,dstIP):minPort ↔ max(srcIP,dstIP):maxPort/proto</text>
  <text x="600" y="558" text-anchor="middle" font-size="11" fill="#374151">Bidirectional traffic (A→B and B→A) maps to the same Key — same Plan applied in both directions.</text>
  <text x="600" y="576" text-anchor="middle" font-size="11" fill="#6b7280">Example: 10.0.0.1:4000→10.0.0.2:80/TCP and 10.0.0.2:80→10.0.0.1:4000/TCP → same key → same Plan</text>

  <!-- ===== LEGEND ===== -->
  <rect x="12" y="604" width="1176" height="58" rx="6" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
  <text x="28" y="622" font-size="10" font-weight="700" fill="#374151">Legend</text>
  <rect x="85" y="613" width="12" height="12" rx="2" fill="#b91c1c"/>
  <text x="102" y="624" font-size="10" fill="#374151">Cache MISS (new Plan built)</text>
  <rect x="280" y="613" width="12" height="12" rx="2" fill="#166534"/>
  <text x="297" y="624" font-size="10" fill="#374151">Cache HIT (Plan reused)</text>
  <rect x="450" y="613" width="12" height="12" rx="2" fill="#b45309"/>
  <text x="467" y="624" font-size="10" fill="#374151">Plan construction (expandPool)</text>
  <rect x="660" y="613" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="677" y="624" font-size="10" fill="#374151">IPPoolPerIter reset</text>
  <rect x="800" y="613" width="12" height="12" rx="2" fill="#374151"/>
  <text x="817" y="624" font-size="10" fill="#374151">Mutator / Cache state</text>
  <text x="28" y="651" font-size="10" fill="#374151">Key insight: Plan is per session.Key, not per packet — the same rewrite is applied to ALL packets in a 5-tuple flow, ensuring stateful device compatibility.</text>
</svg>
